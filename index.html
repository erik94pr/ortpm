<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PM – Överarm | Ortopediska frakturer</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Source+Sans+3:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f2eb;
    --bg-card: #fffef9;
    --border: #d6cfc0;
    --accent: #1a3a5c;
    --accent2: #c0392b;
    --accent3: #2e7d52;
    --text: #1c1a18;
    --text-muted: #6b6459;
    --warning-bg: #fff8e1;
    --warning-border: #e8a800;
    --evidence-a: #2e7d52;
    --evidence-b: #1565c0;
    --evidence-c: #e65100;
    --evidence-d: #6a1520;
    --mono: 'IBM Plex Mono', monospace;
    --serif: 'Libre Baskerville', serif;
    --sans: 'Source Sans 3', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 15px;
    line-height: 1.7;
  }

  /* ── HEADER ── */
  header {
    background: var(--accent);
    color: #fff;
    padding: 0;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 8px rgba(0,0,0,0.25);
  }
  .header-inner {
    max-width: 1100px;
    margin: 0 auto;
    padding: 14px 32px;
    display: flex;
    align-items: center;
    gap: 20px;
  }
  .header-label {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    opacity: 0.6;
    border-right: 1px solid rgba(255,255,255,0.3);
    padding-right: 20px;
  }
  header h1 {
    font-family: var(--serif);
    font-size: 1.45rem;
    font-weight: 700;
    letter-spacing: -0.02em;
  }
  .header-sub {
    margin-left: auto;
    font-family: var(--mono);
    font-size: 10px;
    opacity: 0.5;
    letter-spacing: 1px;
  }

  /* ── LAYOUT ── */
  .page-wrap {
    max-width: 1100px;
    margin: 0 auto;
    padding: 32px 32px 80px;
    display: grid;
    grid-template-columns: 260px 1fr;
    gap: 32px;
    align-items: start;
  }

  /* ── SIDEBAR / FRAKTURLISTA ── */
  .sidebar {
    position: sticky;
    top: 72px;
  }
  .sidebar-title {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-muted);
    padding-bottom: 8px;
    border-bottom: 2px solid var(--accent);
    margin-bottom: 12px;
  }
  .fracture-nav {
    list-style: none;
  }
  .fracture-nav li {
    border-bottom: 1px solid var(--border);
  }
  .fracture-nav button {
    width: 100%;
    text-align: left;
    background: none;
    border: none;
    padding: 11px 14px;
    cursor: pointer;
    font-family: var(--sans);
    font-size: 13.5px;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 10px;
    transition: background 0.15s, color 0.15s;
    border-radius: 4px;
  }
  .fracture-nav button:hover {
    background: #e8e2d8;
  }
  .fracture-nav button.active {
    background: var(--accent);
    color: #fff;
    font-weight: 600;
  }
  .fracture-nav .nav-num {
    font-family: var(--mono);
    font-size: 10px;
    opacity: 0.5;
    min-width: 18px;
  }
  .fracture-nav button.active .nav-num {
    opacity: 0.7;
  }

  /* ── MAIN PM CONTENT ── */
  .pm-panel {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 36px 40px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  }

  .pm-header {
    border-bottom: 2px solid var(--accent);
    padding-bottom: 16px;
    margin-bottom: 28px;
  }
  .pm-category {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 6px;
  }
  .pm-title {
    font-family: var(--serif);
    font-size: 1.7rem;
    font-weight: 700;
    color: var(--accent);
    line-height: 1.2;
  }
  .pm-subtitle {
    font-size: 13px;
    color: var(--text-muted);
    margin-top: 6px;
    font-style: italic;
    font-family: var(--serif);
  }

  /* ── SECTIONS ── */
  .pm-section {
    margin-bottom: 28px;
  }
  .pm-section-title {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--accent);
    font-weight: 600;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .pm-section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .pm-section p, .pm-section li {
    font-size: 14.5px;
    line-height: 1.75;
    color: var(--text);
  }
  .pm-section ul {
    padding-left: 20px;
    margin-top: 4px;
  }
  .pm-section li { margin-bottom: 3px; }

  /* ── TREATMENT BOXES ── */
  .treatment-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    margin-top: 10px;
  }
  .treatment-box {
    border: 1px solid var(--border);
    border-radius: 5px;
    padding: 14px 16px;
    background: var(--bg);
  }
  .treatment-box.primary {
    border-left: 4px solid var(--accent3);
  }
  .treatment-box.secondary {
    border-left: 4px solid var(--accent);
  }
  .treatment-box.surgical {
    border-left: 4px solid var(--accent2);
  }
  .treatment-box h4 {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-bottom: 8px;
    color: var(--text-muted);
  }
  .treatment-box ul {
    list-style: none;
    padding: 0;
    margin: 0;
  }
  .treatment-box li {
    font-size: 13.5px;
    padding: 3px 0;
    padding-left: 14px;
    position: relative;
  }
  .treatment-box li::before {
    content: '→';
    position: absolute;
    left: 0;
    opacity: 0.4;
    font-size: 11px;
  }

  /* ── EVIDENCE BADGES ── */
  .evidence-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-top: 10px;
  }
  .ev-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    border-radius: 3px;
    padding: 3px 9px;
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 600;
  }
  .ev-a { background: #d4edda; color: var(--evidence-a); border: 1px solid #a3d4b0; }
  .ev-b { background: #dce8fa; color: var(--evidence-b); border: 1px solid #a0beec; }
  .ev-c { background: #fde8d8; color: var(--evidence-c); border: 1px solid #f0b88a; }
  .ev-gap { background: #f0e8eb; color: var(--evidence-d); border: 1px solid #d8a8b0; }

  /* ── EVIDENCE GAP BOX ── */
  .evidence-gap {
    background: var(--warning-bg);
    border: 1px solid var(--warning-border);
    border-left: 4px solid var(--warning-border);
    border-radius: 4px;
    padding: 12px 16px;
    margin-top: 16px;
    font-size: 13.5px;
  }
  .evidence-gap strong {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    display: block;
    margin-bottom: 4px;
    color: #7a5800;
  }

  /* ── REFERENCES ── */
  .references {
    margin-top: 24px;
    padding-top: 18px;
    border-top: 1px solid var(--border);
  }
  .ref-title {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 10px;
  }
  .ref-list {
    list-style: none;
    counter-reset: ref-counter;
    padding: 0;
  }
  .ref-list li {
    counter-increment: ref-counter;
    font-size: 12px;
    color: var(--text-muted);
    line-height: 1.5;
    margin-bottom: 6px;
    padding-left: 22px;
    position: relative;
  }
  .ref-list li::before {
    content: counter(ref-counter) '.';
    position: absolute;
    left: 0;
    font-family: var(--mono);
    font-size: 10px;
    top: 1px;
  }

  /* ── CLASSIFICATION TABLE ── */
  .class-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13.5px;
    margin-top: 8px;
  }
  .class-table th {
    text-align: left;
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--text-muted);
    border-bottom: 2px solid var(--border);
    padding: 6px 10px;
    background: var(--bg);
  }
  .class-table td {
    padding: 8px 10px;
    border-bottom: 1px solid var(--border);
    vertical-align: top;
  }
  .class-table tr:last-child td { border-bottom: none; }
  .class-table tr:hover td { background: #f0ebe0; }

  /* ── INTRO PANEL ── */
  .intro-panel {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 32px 40px;
    text-align: center;
    color: var(--text-muted);
  }
  .intro-panel h2 {
    font-family: var(--serif);
    font-size: 1.3rem;
    color: var(--accent);
    margin-bottom: 12px;
  }
  .intro-panel p {
    max-width: 480px;
    margin: 0 auto;
    font-size: 14px;
    line-height: 1.7;
  }
  .intro-arrow {
    font-size: 28px;
    margin-bottom: 12px;
    color: var(--border);
  }

  /* ── RESPONSIVE ── */
  @media (max-width: 768px) {
    .page-wrap { grid-template-columns: 1fr; }
    .sidebar { position: static; }
    .pm-panel { padding: 24px 20px; }
    .treatment-grid { grid-template-columns: 1fr; }
    .header-inner { padding: 12px 16px; }
    .page-wrap { padding: 16px 16px 60px; }
  }
</style>
</head>

function showPM(key) {
  document.getElementById('pm-main').innerHTML = pms[key] || '';
  // Update nav
  document.querySelectorAll('.fracture-nav button').forEach(btn => btn.classList.remove('active'));
  const activeBtn = document.getElementById('nav-' + key);
